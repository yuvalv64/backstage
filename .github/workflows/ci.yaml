name: cicd

on:
  push:
    paths:
      - src/**
      - Dockerfile
      - requirements.txt
      - .github/workflows/ci.yaml
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ steps.vars.outputs.commit_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Declare variables
        id: vars
        shell: bash
        run: |
          echo "COMMIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "commit_id=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ env.COMMIT_SHA }}

  cd:
    runs-on: self-hosted
    needs: ci
    steps:
      - name: Declare variables
        shell: bash
        run: |
          echo ${{ needs.ci.outputs.commit_id }}
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install argocd
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd-linux-amd64
          sudo mv argocd-linux-amd64 /usr/local/bin/argocd
      - name: Login to ArgoCD
        shell: bash
        run: |
          argocd login argocd-server.argocd \
          --insecure --grpc-web \
          --username admin --password \
          ${{ secrets.ARGO_PASSWORD }}
      - name: Sync ArgoCD app
        run: argocd app sync python-app
